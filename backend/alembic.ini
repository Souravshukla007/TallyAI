# Alembic configuration file for TallyAI.
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to migration scripts (relative to this file's location).
script_location = alembic

# Template for new migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone used in file names.
# timezone =

# Max length of slug string used in file names.
truncate_slug_length = 40

# Revision identifiers used by Alembic.
revision_environment = false

# Version table name.
version_table = alembic_version

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
